server {
    listen 3000;

    # Decompress gzip so sub_filter can operate on plaintext
    gunzip on;

    location / {
        proxy_pass http://spiritual-bot-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Ask upstream not to gzip (belt + suspenders with gunzip above)
        proxy_set_header Accept-Encoding identity;

        # Rewrite production backend URL -> local backend in all responses
        sub_filter 'https://ionetra-backend-snh4yqlhmq-el.a.run.app' 'http://localhost:8080';
        sub_filter_once off;
        sub_filter_types text/html application/javascript text/javascript;

        # Disable caching so browser always gets rewritten responses
        add_header Cache-Control "no-store";
        expires off;
    }
}
