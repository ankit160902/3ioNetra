version: '3.8'

services:
  # Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: spiritual-bot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # Redis for Session Storage
  redis:
    image: redis:alpine
    container_name: spiritual-bot-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis_data:/data
    restart: always

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.lite
    container_name: spiritual-bot-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - PYTHONUNBUFFERED=1
    depends_on:
      - qdrant
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload

  # Frontend — production image (internal only, accessed via nginx)
  frontend:
    image: asia-south1-docker.pkg.dev/ionetra/ionetra-docker/frontend@sha256:3a5c7777cf9a37e0abfde0528dd0bcd85993a5ac9b9fc9e499ce074b32b2921d
    platform: linux/amd64
    container_name: spiritual-bot-frontend
    environment:
      - PORT=3000
    restart: unless-stopped

  # nginx — rewrites production backend URL to http://localhost:8080 before JS reaches browser
  nginx:
    image: nginx:stable-alpine3.21
    container_name: spiritual-bot-nginx
    ports:
      - "3003:3000"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  qdrant_storage:
